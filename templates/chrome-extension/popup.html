<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandbox Extension Popup</title>
  <style>
    :root {
      --bg: #0f172a;
      --text: #f8fafc;
      --subtext: #94a3b8;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --border: rgba(255,255,255,0.08);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      width: 320px;
      box-sizing: border-box;
    }
    h3 {
      margin-top: 0;
      font-size: 1.15rem;
      font-weight: 600;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }
    p {
      color: var(--subtext);
      font-size: 0.85rem;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background: var(--primary-hover);
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.75rem;
      color: var(--subtext);
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>🚀 Extension Booster</h3>
  <p>Manifest V3 boilerplate is fully armed and operational! Press the button below to inject actions into the current tab.</p>
  
  <button class="btn" id="action-btn">Ping Content Script</button>
  
  <div class="status" id="status-display">Ready to activate</div>

  <script src="popup.js"></script>
</body>
</html>
